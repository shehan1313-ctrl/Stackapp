// ── BUILD FLOW ────────────────────────────────────────────────────────────────

function BuildFlow() {
  const [step, setStep] = useState(1);
  const [profile, setProfile] = useState({ name: "", twitter: "", instagram: "", email: "", avatarUrl: "" });
  const [items, setItems] = useState([]);
  // Pickable hero highlight: type 'metric' | 'win' | 'tip'
  const [highlight, setHighlight] = useState({ type: "metric", value: "", label: "", text: "" });
  const avatarInputRef = useRef(null);

  async function handleAvatar(e) {
    const file = e.target.files?.[0];
    e.target.value = "";
    if (!file) return;
    const dataUrl = await resizeImage(file, 256);  // compact, square-ish for the avatar circle
    if (dataUrl) setProfile(p => ({ ...p, avatarUrl: dataUrl }));
  }

  function buildHighlight() {
    if (highlight.type === "metric" && highlight.value.trim() && highlight.label.trim())
      return { type: "metric", value: highlight.value.trim(), label: highlight.label.trim() };
    if ((highlight.type === "win" || highlight.type === "tip") && highlight.text.trim())
      return { type: highlight.type, text: highlight.text.trim() };
    return null;
  }

  function submit() {
    if (!profile.name.trim()) return;
    // If a signed-in user already has a stack, update it in place (one canonical
    // username per account) instead of minting a new slug like shehan2/shehan3.
    const existing = currentUserId() ? myStackUsername() : null;
    const username = existing || uniqueUsername(profile.name);
    const referredBy = consumeRef();  // who invited this creator (Path 2), if anyone
    const hl = buildHighlight();
    const stack = {
      username,
      name: profile.name.trim(),
      handle: "@" + username,
      twitter: profile.twitter.trim().replace(/^@/, ""),
      instagram: profile.instagram.trim().replace(/^@/, ""),
      email: profile.email.trim(),
      avatarUrl: profile.avatarUrl || "",
      verified: false,
      items,
      ...(hl ? { highlight: hl } : {}),
      ...(currentUserId() ? { owner_id: currentUserId() } : {}),  // tie to account if signed in
      // ── BACKEND ──: referredBy powers referral-commission payouts later
      ...(referredBy && referredBy !== username ? { referredBy } : {}),
    };
    saveStack(stack);
    track("stack_created", { items: items.length, has_highlight: !!hl, has_avatar: !!stack.avatarUrl, referred: !!referredBy });
    clearRef();
    // Flag so the stack page knows to surface the "claim your stack" prompt
    try { sessionStorage.setItem("sp_justBuilt", username); } catch(_) {}
    if (window.confetti) window.confetti({ particleCount: 130, spread: 80, origin: { y: 0.5 }, colors: ["#2F7A55", "#5A9B74", "#C2895A", "#2A2620"] });
    navigate(`#/stack/${username}`);
  }

  const stepDots = [1, 2, 3];
  const titleMap = { 1: "Create your stack", 2: "Build your stack", 3: "Preview your page" };
  const subMap = { 1: "Start with your profile", 2: `${items.length} item${items.length !== 1 ? "s" : ""} added`, 3: "Here's how it'll look, looking good?" };

  return (
    <div>
      <Topbar />
      <div className="build-page">
        <div className="build-header anim-0">
          <button className="build-back" onClick={() => step > 1 ? setStep(s => s - 1) : navigate(`#/stack/${DEMO_STACK.username}`)}>
            ← {step > 1 ? "Back" : "View demo"}
          </button>
          <div className="build-title">{titleMap[step]}</div>
          <div className="build-subtitle">{subMap[step]}</div>
        </div>
        <div className="step-indicator anim-1">
          {stepDots.map((n, i) => (
            <React.Fragment key={n}>
              {i > 0 && <div className={`step-line ${step > n - 1 ? "done" : ""}`} />}
              <div className={`step-dot ${step === n ? "active" : step > n ? "done" : "pending"}`}>
                {step > n ? "✓" : n}
              </div>
            </React.Fragment>
          ))}
        </div>

        {step === 1 && (
          <div className="form-section anim-2">
            <input ref={avatarInputRef} type="file" accept="image/*" style={{ display: "none" }} onChange={handleAvatar} />
            <div className="avatar-upload" onClick={() => avatarInputRef.current?.click()}>
              <div className="avatar-upload-circle" style={profile.avatarUrl ? { backgroundImage: `url(${profile.avatarUrl})` } : undefined}>
                {!profile.avatarUrl && (
                  <span className="avatar-upload-plus">{profile.name ? profile.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase() : "+"}</span>
                )}
                <div className="avatar-upload-cam">📷</div>
              </div>
              <div className="avatar-upload-label">{profile.avatarUrl ? "Change photo" : "Add a profile photo · optional"}</div>
            </div>
            <div className="form-group">
              <label className="form-label">Name *</label>
              <input className="form-input" placeholder="Jane Smith" value={profile.name} onChange={e => setProfile(p => ({ ...p, name: e.target.value }))} />
              <div className="form-hint">Your page: healthstack.app/stack/{toUsername(profile.name) || "yourname"}</div>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Twitter / X <span style={{color:"var(--text-dim)",fontWeight:400}}>· optional</span></label>
                <input className="form-input" placeholder="@handle" value={profile.twitter} onChange={e => setProfile(p => ({ ...p, twitter: e.target.value }))} />
              </div>
              <div className="form-group">
                <label className="form-label">Instagram <span style={{color:"var(--text-dim)",fontWeight:400}}>· optional</span></label>
                <input className="form-input" placeholder="@handle" value={profile.instagram} onChange={e => setProfile(p => ({ ...p, instagram: e.target.value }))} />
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Email <span style={{color:"var(--text-dim)",fontWeight:400}}>· optional</span></label>
              <input className="form-input" type="email" placeholder="you@email.com" value={profile.email} onChange={e => setProfile(p => ({ ...p, email: e.target.value }))} />
              <div className="form-hint">We'll only use this to reach you about your stack.</div>
            </div>
            <button className="btn btn-primary" style={{ width: "100%", padding: 14, fontSize: 15, marginTop: 8 }}
              disabled={!profile.name.trim()} onClick={() => setStep(2)}>
              Continue →
            </button>
          </div>
        )}

        {step === 2 && <Step2Items items={items} setItems={setItems} onNext={() => setStep(3)} />}

        {step === 3 && (
          <div className="form-section anim-2">
            {/* Live preview of the page they're about to create */}
            <div className="build-preview">
              <div className="build-preview-top">
                <div className="avatar" style={{ width: 48, height: 48, fontSize: 18, backgroundImage: `url(${profile.avatarUrl || DEFAULT_AVATAR})`, backgroundSize: "cover", backgroundPosition: "center" }}>
                  {false && (profile.name || "Y").split(" ").map(w => w[0]).join("").slice(0,2).toUpperCase()}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div className="build-preview-name">{profile.name || "Your name"}</div>
                  <div className="build-preview-handle">@{toUsername(profile.name) || "yourname"}</div>
                </div>
                {highlight.type === "metric" && highlight.value.trim() && (
                  <div style={{ textAlign: "center" }}>
                    <div style={{ fontFamily: "var(--font-serif)", fontSize: 24, color: "var(--accent)", lineHeight: 1 }}>{highlight.value}</div>
                    <div style={{ fontSize: 9, color: "var(--text-muted)", letterSpacing: 0.5, marginTop: 2 }}>{(highlight.label || "").toUpperCase()}</div>
                  </div>
                )}
              </div>
              {(highlight.type === "win" || highlight.type === "tip") && highlight.text.trim() && (
                <div style={{ fontFamily: "var(--font-serif)", fontStyle: "italic", fontSize: 14, color: "var(--text)", marginTop: 10, lineHeight: 1.4 }}>“{highlight.text}”</div>
              )}
              <div className="build-preview-divider" />
              {CATEGORIES.filter(c => items.some(i => i.category === c)).map(cat => (
                <div key={cat} className="build-preview-catrow">
                  <span className="build-preview-dot" style={{ background: CATEGORY_COLORS[cat] }} />
                  <span className="build-preview-cat">{cat}</span>
                  <span className="build-preview-catn">{items.filter(i => i.category === cat).length}</span>
                </div>
              ))}
              {items.length === 0 && <div style={{ fontSize: 12, color: "var(--text-dim)", textAlign: "center", padding: "4px 0" }}>No items yet, you can add them after.</div>}
              {totalCost(items) > 0 && (
                <div className="build-preview-cost"><span>Monthly investment</span><strong>~${totalCost(items)}/mo</strong></div>
              )}
            </div>

            {/* Pickable hero highlight */}
            <div className="build-highlight">
              <div className="form-label" style={{ marginBottom: 8 }}>Add a highlight <span style={{color:"var(--text-dim)",fontWeight:400}}>· optional, but makes your page pop</span></div>
              <div className="hl-tabs">
                {[["metric","📊 Proud metric"],["win","🏆 Health win"],["tip","💡 #1 tip"]].map(([t,lab]) => (
                  <button key={t} className={`hl-tab ${highlight.type===t?"on":""}`} onClick={() => setHighlight(h => ({ ...h, type: t }))}>{lab}</button>
                ))}
              </div>

              {highlight.type === "metric" && (
                <>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6, margin: "12px 0" }}>
                    {["Resting HR","VO2 max","Deep sleep","HRV","Biological age","Body fat %"].map(p => (
                      <button key={p} className="feedback-chip" onClick={() => setHighlight(h => ({ ...h, label: p }))}>{p}</button>
                    ))}
                  </div>
                  <div className="form-row">
                    <div className="form-group" style={{ marginBottom: 0, flex: "0 0 38%" }}>
                      <label className="form-label">Value</label>
                      <input className="form-input" placeholder="48 bpm" value={highlight.value} onChange={e => setHighlight(h => ({ ...h, value: e.target.value }))} />
                    </div>
                    <div className="form-group" style={{ marginBottom: 0 }}>
                      <label className="form-label">Label</label>
                      <input className="form-input" placeholder="Resting heart rate" value={highlight.label} onChange={e => setHighlight(h => ({ ...h, label: e.target.value }))} />
                    </div>
                  </div>
                </>
              )}

              {highlight.type === "win" && (
                <div style={{ marginTop: 12 }}>
                  <textarea className="form-textarea" placeholder="e.g. Reversed my pre-diabetes in 6 months." value={highlight.text} onChange={e => setHighlight(h => ({ ...h, text: e.target.value }))} maxLength={120} />
                </div>
              )}
              {highlight.type === "tip" && (
                <div style={{ marginTop: 12 }}>
                  <textarea className="form-textarea" placeholder="e.g. If you do one thing: get morning sunlight." value={highlight.text} onChange={e => setHighlight(h => ({ ...h, text: e.target.value }))} maxLength={120} />
                </div>
              )}
            </div>

            <button className="btn btn-primary" style={{ width: "100%", padding: 14, fontSize: 15, marginTop: 18 }}
              disabled={!profile.name.trim()} onClick={submit}>
              Create my Healthstack 🎉
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── MAGIC ADD: describe or dictate your whole stack (reused in build + edit) ──
function MagicAdd({ existingItems, onAdd }) {
  const [text, setText] = useState("");
  const [note, setNote] = useState("");
  const [listening, setListening] = useState(false);
  const recogRef = useRef(null);
  const speechOK = typeof window !== "undefined" && (window.SpeechRecognition || window.webkitSpeechRecognition);

  function run() {
    const parsed = parseStackText(text);
    if (!parsed.length) { setNote("Hmm, couldn't pick anything out. Try listing items separated by commas."); return; }
    const existing = new Set((existingItems || []).map(i => (i.name || "").toLowerCase()));
    const fresh = parsed.filter(p => !existing.has(p.name.toLowerCase()));
    onAdd(fresh);
    track("magic_add", { parsed: parsed.length, added: fresh.length });
    setNote(`Added ${fresh.length} item${fresh.length !== 1 ? "s" : ""}${parsed.length !== fresh.length ? ` (${parsed.length - fresh.length} already in your stack)` : ""}. Review & tweak below 👇`);
    setText("");
  }
  function toggleListen() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    if (listening && recogRef.current) { recogRef.current.stop(); return; }
    const r = new SR();
    r.lang = "en-US"; r.interimResults = true; r.continuous = true;
    const base = text ? text + " " : "";
    r.onresult = (e) => { let t = ""; for (let i = 0; i < e.results.length; i++) t += e.results[i][0].transcript; setText(base + t); };
    r.onend = () => setListening(false);
    r.onerror = () => setListening(false);
    recogRef.current = r; setListening(true); setNote(""); r.start();
  }

  return (
    <div className="magic-add">
      <div className="magic-add-head">
        <span className="magic-add-title">✨ Add your whole stack at once</span>
        <span className="magic-add-hint">Type or talk, we'll sort it out</span>
      </div>
      <div className="magic-add-box">
        <textarea className="magic-add-input" value={text} onChange={e => setText(e.target.value)}
          placeholder={"e.g. I take NMN 500mg and magnesium glycinate at night, 5g creatine daily, wear an Oura ring, and get Function Health labs twice a year"} />
        {speechOK && (
          <button className={`magic-mic ${listening ? "on" : ""}`} onClick={toggleListen} aria-label="Dictate" title="Dictate your stack">
            {listening
              ? <span className="magic-mic-stop" />
              : <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="17" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/></svg>}
          </button>
        )}
      </div>
      <div className="magic-add-actions">
        <button className="btn btn-primary btn-sm" disabled={!text.trim()} onClick={run}>Add these to my stack →</button>
        {listening && <span className="magic-listening">● Listening… tap the mic to stop</span>}
      </div>
      {note && <div className="magic-note">{note}</div>}
    </div>
  );
}

// ── STEP 2: CATEGORY-BASED ITEM BUILDER ───────────────────────────────────────

function Step2Items({ items, setItems, onNext }) {
  const [openCat, setOpenCat] = useState(null);
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(null);
  const [form, setForm] = useState({ name: "", dose: "", freq: "", why: "", years: "", cost: "", costPeriod: "mo", affiliateUrl: "" });
  // Camera / scan state
  const [photoUrl, setPhotoUrl] = useState(null);       // resized dataURL
  const [scanState, setScanState] = useState(null);     // null | 'scanning' | 'done' | 'failed'
  const [scanMatches, setScanMatches] = useState([]);   // matched predefined items from OCR
  const [showFeedback, setShowFeedback] = useState(false);
  const [showMore, setShowMore] = useState(false);
  const fileInputRef = useRef(null);

  function openCategory(cat) {
    setOpenCat(cat); setSearch(""); setSelected(null); setPhotoUrl(null); setScanState(null); setScanMatches([]);
    setForm({ name: "", dose: "", freq: "", why: "", years: "", cost: "", costPeriod: "mo", affiliateUrl: "" });
  }

  function pickPredefined(item) {
    const isCustom = item.name.toLowerCase().startsWith("custom");
    setSelected(item);
    setForm(f => ({ ...f, name: isCustom ? "" : item.name, dose: item.dose || "", why: "" }));
  }
  // Open the custom form, optionally pre-filling the name from the search box
  function pickCustom(prefillName) {
    setSelected({ name: "custom", whys: [] });
    setForm(f => ({ ...f, name: prefillName || "", dose: "", why: "" }));
  }

  function applyWhy(text) { setForm(f => ({ ...f, why: text })); }

  function addItem() {
    const name = form.name.trim();
    if (!name) return;
    setItems(prev => [...prev, {
      id: Date.now(), category: openCat, name, dose: form.dose.trim() || undefined, freq: form.freq.trim() || undefined, why: form.why,
      years: parseFloat(form.years)||0, cost: parseFloat(form.cost)||0, costPeriod: openCat === "Wearables" ? "once" : (form.costPeriod || "mo"),
      affiliateUrl: form.affiliateUrl, tags: [],
      photoUrl: photoUrl || undefined,  // store captured photo with the item
    }]);
    setOpenCat(null); setSelected(null); setPhotoUrl(null); setScanState(null); setScanMatches([]);
    setForm({ name: "", dose: "", freq: "", why: "", years: "", cost: "", costPeriod: "mo", affiliateUrl: "" });
  }
  // Dosage helps for supplements & nutrition; frequency mainly for supplements.
  const showDose = categoryFields(openCat).dose;
  const showFreq = categoryFields(openCat).freq;
  const showYears = categoryFields(openCat).years;

  async function handlePhotoChange(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    // Reset file input so the same file can be re-selected
    e.target.value = "";
    setScanState("scanning");
    setScanMatches([]);
    setSelected(null);

    const dataUrl = await resizeImage(file);
    setPhotoUrl(dataUrl);

    // Attempt OCR via Shape Detection API
    const text = await ocrImage(dataUrl);
    if (text) {
      const { matched } = matchByText(text, openCat);
      setScanMatches(matched);
      setScanState("done");
      // Auto-select the top match if confidence is high enough (2+ token hits)
      if (matched.length > 0 && (matched[0].hits || 0) >= 2) {
        pickPredefined(matched[0]);
      }
    } else {
      // TextDetector unavailable, still show photo, highlight nothing specific
      setScanState("failed");
    }
  }

  const catEmojis = { Supplements: "💊", Wearables: "⌚", Labs: "🔬", Nutrition: "🥗", Fitness: "🏃", Sleep: "😴", Mind: "🧘", Services: "✨" };

  const renderCatSection = (cat) => {
    const ci = items.filter(i => i.category === cat);
    const color = CATEGORY_COLORS[cat];
    return (
      <div key={cat} className="cat-section" style={{ "--cat-color": color }}>
        <div className="cat-section-header">
          <div className="cat-section-header-left">
            <span style={{ fontSize: 16 }}>{catEmojis[cat]}</span>
            <span className="cat-label">{cat}</span>
            {ci.length > 0 && <span className="cat-count">{ci.length}</span>}
          </div>
          <button className="btn btn-primary btn-sm" onClick={() => openCategory(cat)}>+ Add</button>
        </div>
        {ci.map(item => (
          <div key={item.id} className="cat-item-row">
            {item.photoUrl && <img src={item.photoUrl} alt="" style={{ width: 36, height: 36, borderRadius: 6, objectFit: "cover", flexShrink: 0 }} />}
            <div style={{ flex: 1 }}>
              <div className="cat-item-name">{item.name}</div>
              {item.why && <div className="cat-item-sub">{item.why.slice(0, 55)}{item.why.length > 55 ? "…" : ""}</div>}
            </div>
            <button className="build-item-remove" onClick={() => setItems(p => p.filter(i => i.id !== item.id))}>×</button>
          </div>
        ))}
      </div>
    );
  };

  // ── OVERVIEW: top 3 categories expanded, the rest behind "+ More" ────────────
  if (!openCat) {
    // Auto-expand "more" if the user already has items in any of those categories
    const moreHasItems = BUILD_CATEGORIES_MORE.some(c => items.some(i => i.category === c));
    const moreOpen = showMore || moreHasItems;
    return (
      <div className="anim-2">
        {/* MAGIC ADD — describe or dictate your whole stack */}
        <MagicAdd existingItems={items} onAdd={(fresh) => setItems(prev => [...prev, ...fresh])} />
        <div className="magic-or"><span>or add by category</span></div>

        {BUILD_CATEGORIES_PRIMARY.map(renderCatSection)}

        {!moreOpen && (
          <button className="cat-more-toggle" onClick={() => setShowMore(true)}>
            + More categories <span>Nutrition · Fitness · Sleep · Mind</span>
          </button>
        )}
        {moreOpen && BUILD_CATEGORIES_MORE.map(renderCatSection)}

        {/* Request other habit categories */}
        <div className="cat-feedback" onClick={() => setShowFeedback(true)}>
          <span className="cat-feedback-icon">💡</span>
          <div>
            <div className="cat-feedback-title">Don't see your habit?</div>
            <div className="cat-feedback-sub">Tell us what else you'd track and we'll add it →</div>
          </div>
        </div>

        <div style={{ padding: "16px 20px 0" }}>
          <button className="btn btn-primary" style={{ width: "100%", padding: 14, fontSize: 15 }} onClick={onNext}>
            {items.length === 0 ? "Skip for now →" : `Continue with ${items.length} item${items.length !== 1 ? "s" : ""} →`}
          </button>
        </div>

        {showFeedback && <FeedbackModal onClose={() => setShowFeedback(false)} />}
      </div>
    );
  }

  // ── ADD PANEL: picker + camera ───────────────────────────────────────────────
  const matchedNames = new Set(scanMatches.map(m => m.name));
  const predefined = PREDEFINED_ITEMS[openCat] || [];
  const baseList = search.trim()
    ? predefined.filter(p => p.name.toLowerCase().includes(search.toLowerCase()))
    : predefined;
  // When scan produced matches, show them first; rest sorted below
  const displayList = scanMatches.length > 0 && !search.trim()
    ? [...scanMatches, ...baseList.filter(p => !matchedNames.has(p.name))]
    : baseList;

  const isCustomSelected = selected && selected.name.toLowerCase().startsWith("custom");
  const whySuggestions = selected ? selected.whys : [];
  const showForm = selected !== null;

  return (
    <div className="anim-2">
      {/* Hidden file input, capture="environment" opens rear camera on mobile */}
      <input
        ref={fileInputRef}
        type="file"
        accept="image/*"
        capture="environment"
        style={{ display: "none" }}
        onChange={handlePhotoChange}
      />

      <div className="add-panel">
        <div className="add-panel-header">
          <button className="build-back" style={{ margin: 0 }} onClick={() => { setOpenCat(null); setSelected(null); setPhotoUrl(null); setScanState(null); setScanMatches([]); }}>←</button>
          <span style={{ fontSize: 16 }}>{catEmojis[openCat]}</span>
          <div className="add-panel-title">Add {openCat}</div>
        </div>

        {/* Photo preview (shown when a photo was taken) */}
        {photoUrl && (
          <div className="photo-preview">
            <img src={photoUrl} alt="Scanned label" />
            {scanState === "scanning" && (
              <div className="photo-overlay">
                <div className="scan-spinner" />
                <span>Reading label…</span>
              </div>
            )}
            <button className="photo-remove" onClick={() => { setPhotoUrl(null); setScanState(null); setScanMatches([]); }}>×</button>
          </div>
        )}

        {/* Scan result note */}
        {scanState === "done" && scanMatches.length > 0 && !showForm && (
          <div className="scan-result-note">
            📸 Found <strong>{scanMatches.length} possible match{scanMatches.length !== 1 ? "es" : ""}</strong>, highlighted below. Tap to select.
          </div>
        )}
        {scanState === "failed" && !showForm && (
          <div className="scan-result-note" style={{ borderColor: "rgba(194,137,90,0.3)", background: "rgba(194,137,90,0.06)" }}>
            📸 Photo saved, text reading isn't available on this browser. Pick from the list or type a name.
          </div>
        )}

        {!showForm && (
          <>
            {/* Camera scan button */}
            {!photoUrl && (
              <button className="scan-btn" onClick={() => fileInputRef.current?.click()}>
                <span className="scan-btn-icon">📷</span>
                Scan label or box instead
              </button>
            )}

            <input className="form-input" placeholder={`Search ${openCat.toLowerCase()}...`}
              value={search} onChange={e => setSearch(e.target.value)} style={{ marginBottom: 10 }} />

            {/* No search match → offer to add exactly what they typed */}
            {search.trim() && displayList.filter(p => !p.name.toLowerCase().startsWith("custom")).length === 0 && (
              <button className="picker-add-custom" onClick={() => pickCustom(search.trim())}>
                ＋ Add “{search.trim()}”
              </button>
            )}

            <div className="picker-list">
              {displayList.filter(p => !p.name.toLowerCase().startsWith("custom")).map(p => {
                const isMatch = matchedNames.has(p.name);
                return (
                  <div
                    key={p.name}
                    className={`picker-item ${selected?.name === p.name ? "selected" : ""} ${isMatch ? "matched" : ""}`}
                    onClick={() => pickPredefined(p)}
                  >
                    <span>{p.name}</span>
                    <span style={{ display: "flex", gap: 6, alignItems: "center" }}>
                      {isMatch && <span className="match-label">Photo match</span>}
                      {selected?.name === p.name && <span className="picker-item-check">✓</span>}
                    </span>
                  </div>
                );
              })}
            </div>

            {/* Always-available manual entry */}
            <button className="picker-add-custom" style={{ marginTop: 10 }} onClick={() => pickCustom(search.trim())}>
              ＋ Add your own {openCat.toLowerCase().replace(/s$/, "")}
            </button>
          </>
        )}

        {showForm && (
          <div>
            {/* Show photo thumbnail next to item name if captured */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14, gap: 10 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                {photoUrl && <img src={photoUrl} alt="" className="item-photo" />}
                <div style={{ fontWeight: 700, fontSize: 15 }}>{isCustomSelected ? "Custom item" : selected.name}</div>
              </div>
              <button className="btn btn-ghost btn-sm" onClick={() => setSelected(null)}>← Back</button>
            </div>

            {(isCustomSelected || showDose) && (
              <div className="form-row">
                {isCustomSelected && (
                  <div className="form-group" style={{ flex: showDose ? 2 : 1 }}>
                    <label className="form-label">Name *</label>
                    <input className="form-input" placeholder={`Enter ${openCat.toLowerCase().replace(/s$/, "")} name…`} value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} autoFocus />
                  </div>
                )}
                {showDose && (
                  <div className="form-group" style={{ flex: 1 }}>
                    <label className="form-label">Dosage <span style={{color:"var(--text-dim)",fontWeight:400}}>· optional</span></label>
                    <input className="form-input" placeholder={openCat === "Nutrition" ? "e.g. daily" : "e.g. 500mg"} value={form.dose} onChange={e => setForm(f => ({ ...f, dose: e.target.value }))} />
                  </div>
                )}
                {showFreq && (
                  <div className="form-group" style={{ flex: 1 }}>
                    <label className="form-label">Frequency <span style={{color:"var(--text-dim)",fontWeight:400}}>· optional</span></label>
                    <input className="form-input" placeholder="e.g. once daily" value={form.freq} onChange={e => setForm(f => ({ ...f, freq: e.target.value }))} />
                  </div>
                )}
              </div>
            )}

            {showFreq && (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, margin: "-4px 0 14px" }}>
                {["Once daily", "2× daily", "3× daily", "AM", "PM", "Weekly", "As needed"].map(fq => (
                  <button key={fq} className={`feedback-chip ${form.freq === fq ? "applied" : ""}`} style={form.freq === fq ? { borderColor: "var(--accent)", color: "var(--accent)" } : {}} onClick={() => setForm(f => ({ ...f, freq: fq }))}>{fq}</button>
                ))}
              </div>
            )}

            <div className="form-group">
              <label className="form-label">Why you use it</label>
              {whySuggestions.length > 0 && !form.why && (
                <div style={{ marginBottom: 8 }}>
                  <div className="suggestions-label">Tap to use a suggestion</div>
                  <div className="suggestion-chips">
                    {whySuggestions.map((s, i) => (
                      <button key={i} className={`suggestion-chip ${form.why === s ? "applied" : ""}`} onClick={() => applyWhy(s)}>{s}</button>
                    ))}
                  </div>
                </div>
              )}
              <textarea className="form-textarea" placeholder="What benefit have you noticed?" value={form.why} onChange={e => setForm(f => ({ ...f, why: e.target.value }))} />
            </div>

            <div className="form-row">
              {showYears && (
              <div className="form-group">
                <label className="form-label">Years used</label>
                <input className="form-input" type="number" placeholder="1" min="0" step="0.5" value={form.years} onChange={e => setForm(f => ({ ...f, years: e.target.value }))} />
              </div>
              )}
              <div className="form-group">
                <label className="form-label">{openCat === "Wearables" ? "One-time fee ($)" : "Cost ($)"}</label>
                {openCat === "Wearables" ? (
                  <input className="form-input" type="number" placeholder="349" value={form.cost} onChange={e => setForm(f => ({ ...f, cost: e.target.value }))} />
                ) : (
                  <div style={{ display: "flex", gap: 6 }}>
                    <input className="form-input" type="number" placeholder={form.costPeriod === "yr" ? "300" : "30"} value={form.cost} onChange={e => setForm(f => ({ ...f, cost: e.target.value }))} />
                    <select className="form-select" style={{ width: 78, paddingRight: 28 }} value={form.costPeriod} onChange={e => setForm(f => ({ ...f, costPeriod: e.target.value }))}>
                      <option value="mo">/mo</option>
                      <option value="yr">/yr</option>
                    </select>
                  </div>
                )}
                <div className="form-hint">{openCat === "Wearables" ? "What the device cost you, one-time." : "Monthly for ongoing, /yr for annual."}</div>
              </div>
            </div>

            <div className="form-group">
              <label className="form-label">Affiliate / referral link (optional)</label>
              <input className="form-input" placeholder="https://..." value={form.affiliateUrl} onChange={e => setForm(f => ({ ...f, affiliateUrl: e.target.value }))} />
            </div>

            <button className="btn btn-primary" style={{ width: "100%", padding: 14, fontSize: 15 }}
              disabled={!(isCustomSelected ? form.name.trim() : selected?.name)} onClick={addItem}>
              Add to stack ✓
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

const REEL_ITEM_LIMIT = 8; // keep the home preview compact; full stack is one click away
function ReelBlock({ stack }) {
  const allGroups = stack && stack.items && stack.items.length
    ? CATEGORIES.map(cat => ({ cat, items: stack.items.filter(i => i.category === cat).map(i => i.name) })).filter(g => g.items.length)
    : REEL_STACK;
  // Cap the number of tiles so a long stack doesn't make the reel tower over the rail.
  let count = 0, truncated = 0;
  const groups = [];
  for (const g of allGroups) {
    const room = REEL_ITEM_LIMIT - count;
    if (room <= 0) { truncated += g.items.length; continue; }
    const items = g.items.slice(0, room);
    truncated += g.items.length - items.length;
    groups.push({ cat: g.cat, items });
    count += items.length;
  }
  const name = stack ? stack.name : "Shehan Chandrasekera";
  const handle = stack ? stack.handle : "@TheCryptoCPA";
  // Use the stack's real monthly total; fall back to a representative figure so the
  // demo reel's Bryan card always renders (real stacks with costs show their true %).
  const reelCost = (stack && stack.items && stack.items.length ? totalCost(stack.items) : 0) || 286;
  const initials = (name || "").split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
  return (
    <div className="reel-dash">
      <div className="reel-dash-rail">
        <div className="reel-head">
          <div className="avatar" style={{ width: 38, height: 38, fontSize: 14, backgroundImage: `url(${(stack && stack.avatarUrl) || DEFAULT_AVATAR})`, backgroundSize: "cover", backgroundPosition: "center" }} />

          <div>
            <div style={{ fontSize: 13, fontWeight: 700 }}>{name}</div>
            <div style={{ fontSize: 11, color: "var(--text-muted)" }}>{handle}</div>
          </div>
        </div>
        {stack && stack.highlight && (
          stack.highlight.type === "metric"
            ? <div className="reel-hl"><div className="reel-hl-ring"><div className="reel-hl-ring-in">{stack.highlight.value}</div></div><div><div className="reel-hl-eyebrow">Proudest metric</div><div className="reel-hl-label">{stack.highlight.label}</div></div></div>
            : stack.highlight.text
              ? <div className="reel-hl"><div><div className="reel-hl-eyebrow">{stack.highlight.type === "win" ? "Biggest win" : "Top tip"}</div><div className="reel-hl-quote">“{stack.highlight.text}”</div></div></div>
              : null
        )}
        <BryanCardB2 stack={stack || { handle, name, username: "" }} cost={reelCost} url={stack && stack.username ? `healthstack.app/stack/${stack.username}` : undefined} />
      </div>
      <div className="reel-dash-main">
        {groups.map((g, gi) => (
          <div key={gi}>
            <div className="reel-cat"><span className="reel-dot" style={{ background: CATEGORY_COLORS[g.cat] }} />{g.cat}</div>
            <div className="reel-grid">
              {g.items.map((nm, i) => {
                const color = CATEGORY_COLORS[g.cat];
                return (
                  <div key={i} className="reel-tile">
                    <div className="reel-chip" style={{ background: `linear-gradient(150deg, #fff, ${hexA(color, 0.12)})`, color }}>
                      {usesInitials(g.cat)
                        ? <span style={{ fontFamily: "var(--font-serif)", fontStyle: "italic" }}>{itemInitials(nm)}</span>
                        : <span>{CATEGORY_EMOJI[g.cat] || "✦"}</span>}
                    </div>
                    <div className="reel-name">{nm}</div>
                  </div>
                );
              })}
            </div>
          </div>
        ))}
        {truncated > 0 && <div className="reel-more">+{truncated} more in the full stack →</div>}
      </div>
    </div>
  );
}

function Landing() {
  const [i, setI] = useState(0);
  const touchStart = useRef(null);
  const last = LAND_SLIDES.length - 1;

  function go(dir) {
    setI(prev => Math.max(0, Math.min(last, prev + dir)));
  }
  function onTouchStart(e) { touchStart.current = e.touches[0].clientX; }
  function onTouchEnd(e) {
    if (touchStart.current == null) return;
    const dx = e.changedTouches[0].clientX - touchStart.current;
    if (Math.abs(dx) > 45) go(dx < 0 ? 1 : -1);
    touchStart.current = null;
  }

  return (
    <div className="land-page">
      <div className="land-topbar">
        <Logo onClick={() => navigate("#/")} />
        <button className="land-skip" onClick={() => navigate("#/build")}>Skip →</button>
      </div>

      <div className="land-viewport" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
        <div className="land-slides" style={{ transform: `translateX(-${i * 100}%)` }}>
          {LAND_SLIDES.map(s => (
            <div className="land-slide" key={s.n}>
              <div className="land-bg-num">{s.n}</div>
              <div className="land-slide-inner">
                <div className="land-icon-ring" style={{ background: s.bg, border: `1.5px solid ${s.border}` }}>{s.icon}</div>
                <div className="land-step-label" style={{ color: s.color }}>{s.label}</div>
                <div className="land-title">{s.title}</div>
                <div className="land-desc">{s.desc}</div>

                {s.earnings && (
                  <div className="earn-card">
                    <div className="earn-card-head">
                      <div className="earn-card-label">Your earnings</div>
                      <div className="earn-card-live"><span className="earn-live-dot" /> LIVE</div>
                    </div>
                    <div className="earn-amount">$284</div>
                    <div className="earn-sub">this month · 47 clicks · 12 orders</div>
                    <div className="earn-rows">
                      <div className="earn-row"><span className="earn-row-name">Oura Ring Gen 4</span><span className="earn-row-val">+$120</span></div>
                      <div className="earn-row"><span className="earn-row-name">Levels CGM</span><span className="earn-row-val">+$72</span></div>
                      <div className="earn-row"><span className="earn-row-name">NMN 500mg</span><span className="earn-row-val">+$48</span></div>
                      <div className="earn-row"><span className="earn-row-name">Creatine 5g</span><span className="earn-row-val">+$44</span></div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="land-nav">
        <div className="land-dots">
          {LAND_SLIDES.map((_, idx) => (
            <div key={idx} className={`land-dot ${idx === i ? "active" : ""}`} onClick={() => setI(idx)} />
          ))}
        </div>
        <div className="land-btns">
          {i > 0 && <button className="land-btn-back" onClick={() => go(-1)}>← Back</button>}
          <button
            className="land-btn-next"
            onClick={() => i === last ? navigate("#/build") : go(1)}
          >
            {i === last ? "Build my stack, free →" : "Next →"}
          </button>
        </div>
      </div>
    </div>
  );
}

const EMAIL_RE = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;
function getFollowEmail() { try { return localStorage.getItem("follow_email") || ""; } catch (_) { return ""; } }
function getFollowed() { try { return JSON.parse(localStorage.getItem("followed_v1") || "{}"); } catch (_) { return {}; } }

// "Follow <creator> for weekly protocol updates" — contextual email capture on cards & stack pages.
function FollowControl({ creator, name, variant = "card" }) {
  const [followed, setFollowed] = useState(() => !!getFollowed()[creator]);
  const [open, setOpen] = useState(false);
  const [email, setEmail] = useState(() => getFollowEmail());
  const [err, setErr] = useState("");
  const first = (name || "").split(" ")[0] || "them";

  const doFollow = (em) => {
    const v = (em || "").trim();
    if (!EMAIL_RE.test(v)) { setErr("Enter a valid email"); return; }
    try {
      localStorage.setItem("follow_email", v);
      const f = getFollowed(); f[creator] = v; localStorage.setItem("followed_v1", JSON.stringify(f));
    } catch (_) {}
    remoteFollow(v, creator);
    track("follow_creator", { creator });
    setFollowed(true); setOpen(false); setErr("");
  };
  const onToggle = (e) => {
    e.stopPropagation();
    if (followed) return;
    const existing = getFollowEmail();
    if (EMAIL_RE.test(existing)) doFollow(existing);   // already gave email once → one-click follow
    else setOpen(o => !o);
  };
  const stop = (e) => e.stopPropagation();

  if (followed) {
    return <button className={`follow-btn done ${variant}`} onClick={stop} type="button">✓ Following {first}</button>;
  }
  return (
    <div className={`follow-wrap ${variant}`} onClick={stop}>
      <button className={`follow-btn ${variant}`} onClick={onToggle} type="button">🔔 Follow for weekly updates</button>
      {open && (
        <form className="follow-form" onClick={stop} onSubmit={(e) => { e.preventDefault(); doFollow(email); }}>
          <input className="follow-input" type="email" inputMode="email" autoFocus placeholder="you@email.com"
                 value={email} onChange={(e) => { setEmail(e.target.value); setErr(""); }} />
          <button className="follow-go" type="submit">Notify me</button>
        </form>
      )}
      {open && (err
        ? <div className="follow-err">{err}</div>
        : <div className="follow-note">Get a 5-min weekly digest of {first}'s new protocols. No spam, unsubscribe anytime.</div>)}
    </div>
  );
}

function App() {
  const loc = useRouter();
  useEffect(() => {
    captureRef();  // stash incoming ?ref= for the build flow
    if (getRefParam()) track("ref_landed", { ref: getRefParam() });
    // After a magic-link redirect, Supabase consumes the token from the URL, clean it up.
    if (/access_token|refresh_token/.test(window.location.hash)) {
      setTimeout(() => navigate("#/"), 300);
    }
  }, []);
  // Fire a pageview on every route change (hash-based SPA)
  useEffect(() => { track("pageview", { route: loc.route, username: loc.username || "" }); }, [loc.route, loc.username]);
  if (loc.route === "home") return <HomePage />;
  if (loc.route === "tour") return <Landing />;
  if (loc.route === "stack") return <Healthstack key={loc.username} username={loc.username} />;
  if (loc.route === "earnings") return <EarningsPage key={loc.username} username={loc.username} />;
  if (loc.route === "build") return <BuildFlow />;
  if (loc.route === "examples") return <ExamplesPage />;
  if (loc.route === "about") return <StaticPage page="about" />;
  if (loc.route === "privacy") return <StaticPage page="privacy" />;
  if (loc.route === "terms") return <StaticPage page="terms" />;
  return (
    <div><Topbar />
      <div className="not-found">
        <div className="not-found-title">Page not found</div>
        <button className="btn btn-primary" onClick={() => navigate("#/")}>Go home</button>
      </div>
    </div>
  );
}
