function Landing() {
  const [i, setI] = useState(0);
  const touchStart = useRef(null);
  const last = LAND_SLIDES.length - 1;

  function go(dir) {
    setI(prev => Math.max(0, Math.min(last, prev + dir)));
  }
  function onTouchStart(e) { touchStart.current = e.touches[0].clientX; }
  function onTouchEnd(e) {
    if (touchStart.current == null) return;
    const dx = e.changedTouches[0].clientX - touchStart.current;
    if (Math.abs(dx) > 45) go(dx < 0 ? 1 : -1);
    touchStart.current = null;
  }

  return (
    <div className="land-page">
      <div className="land-topbar">
        <div className="topbar-logo" onClick={() => navigate("#/")}>StackPage</div>
        <button className="land-skip" onClick={() => navigate("#/build")}>Skip →</button>
      </div>

      <div className="land-viewport" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
        <div className="land-slides" style={{ transform: `translateX(-${i * 100}%)` }}>
          {LAND_SLIDES.map(s => (
            <div className="land-slide" key={s.n}>
              <div className="land-bg-num">{s.n}</div>
              <div className="land-slide-inner">
                <div className="land-icon-ring" style={{ background: s.bg, border: `1.5px solid ${s.border}` }}>{s.icon}</div>
                <div className="land-step-label" style={{ color: s.color }}>{s.label}</div>
                <div className="land-title">{s.title}</div>
                <div className="land-desc">{s.desc}</div>

                {s.earnings && (
                  <div className="earn-card">
                    <div className="earn-card-head">
                      <div className="earn-card-label">Your earnings</div>
                      <div className="earn-card-live"><span className="earn-live-dot" /> LIVE</div>
                    </div>
                    <div className="earn-amount">$284</div>
                    <div className="earn-sub">this month · 47 clicks · 12 orders</div>
                    <div className="earn-rows">
                      <div className="earn-row"><span className="earn-row-name">Oura Ring Gen 4</span><span className="earn-row-val">+$120</span></div>
                      <div className="earn-row"><span className="earn-row-name">Levels CGM</span><span className="earn-row-val">+$72</span></div>
                      <div className="earn-row"><span className="earn-row-name">NMN 500mg</span><span className="earn-row-val">+$48</span></div>
                      <div className="earn-row"><span className="earn-row-name">Creatine 5g</span><span className="earn-row-val">+$44</span></div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="land-nav">
        <div className="land-dots">
          {LAND_SLIDES.map((_, idx) => (
            <div key={idx} className={`land-dot ${idx === i ? "active" : ""}`} onClick={() => setI(idx)} />
          ))}
        </div>
        <div className="land-btns">
          {i > 0 && <button className="land-btn-back" onClick={() => go(-1)}>← Back</button>}
          <button
            className="land-btn-next"
            onClick={() => i === last ? navigate("#/build") : go(1)}
          >
            {i === last ? "Build my stack — free →" : "Next →"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────

function App() {
  const loc = useRouter();
  useEffect(() => {
    captureRef();  // stash incoming ?ref= for the build flow
    if (getRefParam()) track("ref_landed", { ref: getRefParam() });
  }, []);
  // Fire a pageview on every route change (hash-based SPA)
  useEffect(() => { track("pageview", { route: loc.route, username: loc.username || "" }); }, [loc.route, loc.username]);
  if (loc.route === "home") return <HomePage />;
  if (loc.route === "tour") return <Landing />;
  if (loc.route === "stack") return <StackPage key={loc.username} username={loc.username} />;
  if (loc.route === "earnings") return <EarningsPage key={loc.username} username={loc.username} />;
  if (loc.route === "build") return <BuildFlow />;
  return (
    <div><Topbar />
      <div className="not-found">
        <div className="not-found-title">Page not found</div>
        <button className="btn btn-primary" onClick={() => navigate("#/stack/shehan")}>Go home</button>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
